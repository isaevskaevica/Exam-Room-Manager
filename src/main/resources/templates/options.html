<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <title>Exam Options</title>
</head>
<body>

<header class="dashboard-header">
    <img th:src="@{/images/moodle-io.png}" alt="FINKI Logo" class="dashboard-logo">
    <div class="dashboard-header-actions">
        <a class="btn-reservations" th:href="@{/dashboard}">← Dashboard</a>
        <form th:action="@{/logout}" method="post">
            <button class="btn-logout" type="submit">Одјава</button>
        </form>
    </div>
</header>

<div class="dashboard-content options-content">
    <div class="options-card">

        <form th:action="@{/exam/classrooms}" method="get">
            <h2 class="options-title" th:text="${subject.name}"></h2>
            <input type="hidden" name="subjectId" th:value="${subject.id}"/>

            <div class="field-group">
                <label class="field-label">Датум</label>
                <input class="field-input" type="date" name="date" required/>
            </div>

            <div class="field-group">
                <label class="field-label">Почеток</label>
                <input class="field-input" type="time" name="startTime" required/>
            </div>

            <div class="field-group">
                <label class="field-label">Траење (минути)</label>
                <input class="field-input" type="number" name="duration" min="10" max="300" placeholder="пр. 120" required/>
            </div>

            <div class="field-group">
                <label class="field-label">Број на запишани студенти</label>
                <input class="field-input" type="number" id="enrolledInput" min="1" placeholder="пр. 200"/>
            </div>

            <button type="button" class="btn-predict" id="predictBtn">
                🤖 Предвиди присуство
            </button>

            <p class="predict-result hidden" id="predictResult"></p>

            <div class="field-group" style="margin-top: 16px">
                <label class="field-label">Очекуван број на студенти</label>
                <input class="field-input" type="number" name="numberOfStudents" id="numberOfStudents" min="1" placeholder="пр. 60" required/>
            </div>

            <button class="btn-submit" type="submit">Види слободни простории →</button>
        </form>
    </div>
</div>

<script th:inline="javascript">
    const subjectId = /*[[${subject.id}]]*/ null;

    document.getElementById('predictBtn').addEventListener('click', async function () {
        const enrolled = document.getElementById('enrolledInput').value;

        if (!enrolled || enrolled < 1) {
            alert('Внеси број на запишани студенти прво.');
            return;
        }

        this.textContent = '⏳ Предвидувам...';
        this.disabled = true;

        try {
            const response = await fetch('http://localhost:8000/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    subject_id: subjectId,
                    enrolled_survey: parseInt(enrolled)
                })
            });

            const data = await response.json();
            const predicted = data.predicted_attendance;
            const rate = Math.round(data.attendance_rate * 100);

            document.getElementById('numberOfStudents').value = predicted;
            const result = document.getElementById('predictResult');
            result.textContent = `Предвидено: ${predicted} студенти (${rate}% присуство)`;
            result.classList.remove('hidden');

        } catch (e) {
            alert('Грешка при поврзување со prediction сервисот.');
        } finally {
            this.textContent = '🤖 Предвиди присуство';
            this.disabled = false;
        }
    });
</script>

</body>
</html>
