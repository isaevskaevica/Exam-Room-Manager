<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <title>Избери простории</title>
</head>
<body>

<header class="dashboard-header">
    <a href="/dashboard"><img th:src="@{/images/moodle-io.png}" alt="FINKI Logo" class="dashboard-logo"></a>
    <div class="dashboard-header-actions">
        <a class="btn-reservations" th:href="@{/dashboard}">← Dashboard</a>
        <form th:action="@{/logout}" method="post">
            <button class="btn-logout" type="submit">Одјава</button>
        </form>
    </div>
</header>

<div class="dashboard-content">

    <div class="classrooms-top">
        <div>
            <h2 class="options-title" th:text="${subject.name}"></h2>
            <p class="classrooms-meta">
                <span th:text="${date}"></span> •
                <span th:text="${startTime}"></span> •
                <span th:text="${duration}"></span> мин •
                <span th:text="${numberOfStudents}"></span> студенти
            </p>
        </div>

        <form th:action="@{/exam/classrooms}" method="get" class="filter-form">
            <input type="hidden" name="subjectId" th:value="${subject.id}"/>
            <input type="hidden" name="date" th:value="${date}"/>
            <input type="hidden" name="startTime" th:value="${startTime}"/>
            <input type="hidden" name="duration" th:value="${duration}"/>
            <input type="hidden" name="numberOfStudents" th:value="${numberOfStudents}"/>
            <select name="computerAvailability" class="filter-select" onchange="this.form.submit()">
                <option value="">Сите простории</option>
                <option th:each="ca : ${computerAvailabilities}"
                        th:value="${ca}"
                        th:text="${ca}"
                        th:selected="${ca == selectedFilter}">
                </option>
            </select>
        </form>
    </div>

    <p th:if="${error}" class="classrooms-error" th:text="${error}"></p>

    <form th:action="@{/exam/reservations}" method="post">
        <input type="hidden" name="subjectId" th:value="${subject.id}"/>
        <input type="hidden" name="date" th:value="${date}"/>
        <input type="hidden" name="startTime" th:value="${startTime}"/>
        <input type="hidden" name="duration" th:value="${duration}"/>
        <input type="hidden" name="numberOfStudents" th:value="${numberOfStudents}"/>

        <div class="classrooms-grid">
            <label th:each="classroom : ${classrooms}"
                   th:classappend="${unavailableIds.contains(classroom.id)} ? ' unavailable' : ''"
                   class="classroom-card">
                <input type="checkbox"
                       name="classroomIds"
                       th:value="${classroom.id}"
                       th:disabled="${unavailableIds.contains(classroom.id)}"/>
                <div class="classroom-info">
                    <span class="classroom-name" th:text="${classroom.name}"></span>
                    <span class="classroom-details">
                        Капацитет: <span th:text="${classroom.capacity}"></span> •
                        <span th:text="${classroom.computerAvailability}"></span>
                    </span>
                </div>
                <span th:if="${unavailableIds.contains(classroom.id)}" class="unavailable-badge">Зафатена</span>
            </label>
        </div>

        <button class="btn-submit" type="submit" style="max-width: 480px; margin: 20px auto; display: block;">
            Резервирај →
        </button>
    </form>

</div>

<footer class="dashboard-footer">
    <p>&copy; 2026 FINKI Exam Room Manager. Веб Програмирање</p>
</footer>

</body>
</html>
