<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <title>Измени резервација</title>
</head>
<body>

<header class="dashboard-header">
    <img th:src="@{/images/moodle-io.png}" alt="FINKI Logo" class="dashboard-logo">
    <div class="dashboard-header-actions">
        <a class="btn-reservations" th:href="@{/reservations}">← Резервации</a>
        <form th:action="@{/logout}" method="post">
            <button class="btn-logout" type="submit">Одјава</button>
        </form>
    </div>
</header>

<div class="dashboard-content options-content">
    <div class="options-card">
        <h2 class="options-title" th:text="${reservation.exam.subject.name}"></h2>

        <form th:action="@{/reservations/edit/{id}(id=${reservation.id})}" method="post">

            <div class="field-group">
                <label class="field-label">Почеток</label>
                <input class="field-input" type="time" name="startTime"
                       th:value="${reservation.exam.startTime}" required/>
            </div>

            <div class="field-group">
                <label class="field-label">Траење (минути)</label>
                <input class="field-input" type="number" name="duration"
                       th:value="${reservation.exam.duration}" min="30" max="300" required/>
            </div>

            <div class="field-group">
                <label class="field-label">Број на студенти</label>
                <input class="field-input" type="number" name="numberOfStudents"
                       th:value="${reservation.exam.numberOfStudents}" min="1" required/>
            </div>

            <div class="field-group">
                <label class="field-label">Просторија</label>
                <select class="field-input" name="classroomId">
                    <option th:each="c : ${classrooms}"
                            th:value="${c.id}"
                            th:text="${c.name}"
                            th:selected="${c.id == reservation.classroom.id}">
                    </option>
                </select>
            </div>

            <button class="btn-submit" type="submit">Зачувај промени</button>

        </form>

        <a class="btn-cancel" th:href="@{/reservations}">Откажи</a>

    </div>
</div>

</body>
</html>
