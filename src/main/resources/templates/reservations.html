<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/core@6.1.11/locales/mk.global.min.js"></script>
    <title>Резервации</title>
</head>
<body>

<header class="dashboard-header">
    <img th:src="@{/images/moodle-io.png}" alt="FINKI Logo" class="dashboard-logo">
    <div class="dashboard-header-actions">
        <a class="btn-reservations" th:href="@{/dashboard}">← Dashboard</a>
        <form th:action="@{/logout}" method="post">
            <button class="btn-logout" type="submit">Одјава</button>
        </form>
    </div>
</header>

<div class="reservations-content">

    <div class="reservations-top">
        <h2 class="dashboard-section-title">Резервации</h2>

        <form th:action="@{/reservations}" method="get" class="filter-form">

            <select name="subjectName" class="filter-select" onchange="this.form.submit()">
                <option value="">Сите предмети</option>
                <option th:each="subject : ${subjects}"
                        th:value="${subject.name}"
                        th:text="${subject.name}"
                        th:selected="${subject.name == selectedSubjectName}">
                </option>
            </select>

            <select name="scope" class="filter-select" onchange="this.form.submit()">
                <option value="mine" th:selected="${selectedScope == 'mine'}">Мои резервации</option>
                <option value="all" th:selected="${selectedScope == 'all'}">Сите професори</option>
            </select>

            <button class="btn-filter" type="submit">Филтрирај</button>

        </form>
    </div>

    <div id="calendar"></div>

</div>

<!-- Modal за детали -->
<div id="event-modal" class="modal hidden">
    <div class="modal-card">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <h3 id="modal-title"></h3>
        <p><span class="modal-label">Датум: </span><span id="modal-date"></span></p>
        <p><span class="modal-label">Почеток: </span><span id="modal-time"></span></p>
        <p><span class="modal-label">Траење: </span><span id="modal-duration"></span></p>
        <p><span class="modal-label">Просторија: </span><span id="modal-classroom"></span></p>
        <p><span class="modal-label">Професор: </span><span id="modal-professor"></span></p>
        <div id="modal-actions" class="modal-actions"></div>
    </div>
</div>

<footer class="dashboard-footer">
    <p>&copy; 2026 FINKI Exam Room Manager. Веб Програмирање</p>
</footer>

<script th:inline="javascript">
    const loggedInProfessorId = /*[[${loggedInProfessor.id}]]*/ null;
    const selectedSubject = /*[[${selectedSubjectName ?: ''}]]*/ '';

    document.addEventListener('DOMContentLoaded', function () {
        const calendarEl = document.getElementById('calendar');

        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            locale: 'mk',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: ''
            },
            events: {
                url: '/reservations/api',
                extraParams: function() {
                    return {
                        subjectName: selectedSubject,
                        scope: /*[[${selectedScope ?: 'mine'}]]*/ 'mine'
                    };
                },
                failure: function () {
                    alert('Грешка при вчитување на резервации.');
                }
            },
            eventClick: function (info) {
                const e = info.event;
                const p = e.extendedProps;

                document.getElementById('modal-title').textContent = e.title;
                document.getElementById('modal-date').textContent = e.startStr;
                document.getElementById('modal-time').textContent = p.startTime;
                document.getElementById('modal-duration').textContent = p.duration + ' мин';
                document.getElementById('modal-classroom').textContent = p.classroom;
                document.getElementById('modal-professor').textContent = p.professor;

                const actions = document.getElementById('modal-actions');
                if (p.professorId === loggedInProfessorId) {
                    actions.innerHTML = `
                        <a class="btn-edit" href="/reservations/edit/${e.id}">Измени</a>
                        <a class="btn-delete" href="/reservations/delete/${e.id}">Избриши</a>
                    `;
                } else {
                    actions.innerHTML = `<span class="not-yours">Не е ваша резервација</span>`;
                }

                document.getElementById('event-modal').classList.remove('hidden');
            }
        });

        calendar.render();
    });

    function closeModal() {
        document.getElementById('event-modal').classList.add('hidden');
    }
</script>

</body>
</html>
