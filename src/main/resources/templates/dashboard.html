<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <title>Dashboard</title>
</head>
<body>

<header class="dashboard-header">
    <img th:src="@{/images/moodle-io.png}" alt="FINKI Logo" class="dashboard-logo">
    <div class="dashboard-header-actions">
        <form th:action="@{/reservations}" method="get">
            <button class="btn-reservations" type="submit">Резервации</button>
        </form>
        <form th:action="@{/logout}" method="post">
            <button class="btn-logout" type="submit">Одјава</button>
        </form>
    </div>
</header>

<div class="dashboard-welcome-banner">
    <span>Добродојдовте, <span th:text="${professor.getFullName()}"></span>!</span>
</div>

<div class="dashboard-content">
    <h2 class="dashboard-section-title">Ваши предмети</h2>

    <p th:if="${#lists.isEmpty(subjects)}" class="dashboard-empty">Немате доделено предмети.</p>

    <div class="subjects-grid">
        <a th:each="subject : ${subjects}"
           th:href="@{/exam/options(subjectId=${subject.id})}"
           class="subject-card">
            <span class="subject-name" th:text="${subject.name}"></span>
            <span class="subject-code" th:text="${subject.code}"></span>
        </a>
    </div>
</div>

</body>
</html>
